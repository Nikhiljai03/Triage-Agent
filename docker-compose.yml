# Docker Compose for the Triage Agent (Phase 0 skeleton).
# Four services: FastAPI gateway, background worker, Qdrant (vectors), Redis (queue).
# Copy .env.example to .env before `docker compose up` — every service reads it.

services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - qdrant
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    env_file: .env
    # The agent's reproduce step spawns locked-down sandbox containers via the
    # host Docker daemon (Docker-out-of-Docker), so the worker needs the socket.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
      - qdrant
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"  # REST / dashboard
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  qdrant_storage:
